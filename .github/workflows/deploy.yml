name: Deploy to Production

on:
  push:
    branches: [master]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      
      - name: Build and push Docker images
        run: |
          docker build -f backend/Dockerfile -t crm-backend:${{ github.sha }} ./backend
          docker build -f frontend/Dockerfile.prod -t crm-frontend:${{ github.sha }} ./frontend
          docker push crm-backend:${{ github.sha }}
          docker push crm-frontend:${{ github.sha }}
      
      - name: Deploy to server
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            cd /app/crm
            docker compose pull
            docker compose up -d
            docker system prune -f
